<svg width="400" height="400" viewBox="-6 -6 12 12" xmlns="http://www.w3.org/2000/svg">
<!-- Cercle R rempli gris -->
<circle cx="-2" cy="1" r="3.1" fill="#d3d3d3" stroke="black" stroke-width="0.06"/>

<!-- Cercle D rempli blanc -->
<circle cx="0" cy="-2" r="2.2" fill="white" stroke="black" stroke-width="0.06"/>

<!-- Label R -->
<text x="-2.5" y="1" text-anchor="middle" dominant-baseline="central" fill="black" font-family="sans-serif" font-size="0.7">R</text>

<!-- Label D -->
<text x="0.5" y="-2" text-anchor="middle" dominant-baseline="central" fill="black" font-family="sans-serif" font-size="0.7">D</text>

<!-- Croix centre R -->
<line x1="-2.13" y1="0.87" x2="-1.87" y2="1.13" stroke="black" stroke-width="0.05"/>
<line x1="-2.13" y1="1.13" x2="-1.87" y2="0.87" stroke="black" stroke-width="0.05"/>

<!-- Croix centre D -->
<line x1="-0.13" y1="-2.13" x2="0.13" y2="-1.87" stroke="black" stroke-width="0.05"/>
<line x1="-0.13" y1="-1.87" x2="0.13" y2="-2.13" stroke="black" stroke-width="0.05"/>

<!-- Rayon R -->
<line x1="-2" y1="1" x2="-4.19" y2="3.19" stroke="black" stroke-width="0.05"/>
<text x="-3.45" y="1.74" text-anchor="middle" dominant-baseline="central" fill="black" font-family="sans-serif" font-size="0.45">3,1</text>

<!-- Rayon D -->
<line x1="0" y1="-2" x2="1.1" y2="-3.91" stroke="black" stroke-width="0.05"/>
<text x="0.12" y="-3.2" text-anchor="middle" dominant-baseline="central" fill="black" font-family="sans-serif" font-size="0.45" transform="rotate(60, 0.12, -3.2)">2,2</text>
</svg>
