<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 410" width="420" height="410">

  <!-- Quadrilatère principal : (0.2,0.2) (3.6,0.2) (3.6,1.9) (2.17,2.95) -->
  <!-- Transformation : x_svg = x_ps*100+20 ; y_svg = (3.6-y_ps)*100+20 -->
  <polygon
    points="40,360 380,360 380,190 237,85"
    fill="none" stroke="black" stroke-width="1.5" stroke-linejoin="miter"/>

  <!-- Marque d'angle droit en (3.6, 0.2) : \rput{90}(3.6,0.2){\psframe(0.2,0.2)} -->
  <!-- Rotation 90° : coins PS : (3.6,0.2)(3.6,0.4)(3.4,0.4)(3.4,0.2) -->
  <polygon
    points="380,360 380,340 360,340 360,360"
    fill="white" stroke="black" stroke-width="1.5"/>

  <!-- Marque d'angle droit en (2.17, 2.95) : \rput{-120}(2.17,2.95){\psframe(0.2,0.2)} -->
  <!-- Rotation -120° : cos=-0.5, sin=-0.866 -->
  <polygon
    points="237,85 227,102.32 244.32,112.32 254.32,95"
    fill="white" stroke="black" stroke-width="1.5"/>

  <!-- Tiret simple sur le côté supérieur-droit -->
  <!-- \psline(2.75,2.4)(2.95,2.6) -->
  <line x1="295" y1="140" x2="315" y2="120" stroke="black" stroke-width="1.5"/>

  <!-- Tiret simple sur le côté droit (vertical) -->
  <!-- \psline(3.5,1.)(3.7,1.1) -->
  <line x1="370" y1="280" x2="390" y2="270" stroke="black" stroke-width="1.5"/>

  <!-- Double tiret sur le côté bas (horizontal) -->
  <!-- \psline(2,0.05)(2,0.35) -->
  <line x1="220" y1="375" x2="220" y2="345" stroke="black" stroke-width="1.5"/>
  <!-- \psline(2.1,0.05)(2.1,0.35) -->
  <line x1="230" y1="375" x2="230" y2="345" stroke="black" stroke-width="1.5"/>

  <!-- Double tiret sur le côté diagonal gauche -->
  <!-- \psline(1.15,1.8)(1.35,1.6) -->
  <line x1="135" y1="200" x2="155" y2="220" stroke="black" stroke-width="1.5"/>
  <!-- \psline(1.2,1.9)(1.4,1.7) -->
  <line x1="140" y1="190" x2="160" y2="210" stroke="black" stroke-width="1.5"/>

</svg>
