<!-- Vecteurs de construction pointillés -->
<line x1="160" y1="120" x2="320" y2="80" stroke="#D36740" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr-orange-light)" opacity="0.6"/>
<line x1="400" y1="200" x2="560" y2="160" stroke="#D36740" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr-orange-light)" opacity="0.6"/>
