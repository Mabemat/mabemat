<!-- Vecteur AA' : A(-5,3) vers A'(-1,4) -->
<line x1="80" y1="80" x2="240" y2="40" stroke="#D36740" stroke-width="2" marker-end="url(#arr-orange)"/>
<text x="72" y="100" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="black">A</text>
<text x="248" y="60" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="black">A'</text>

<!-- Trapèze MNOP - noir -->
<polygon points="160,120 400,200 400,320 280,280" fill="none" stroke="black" stroke-width="2"/>
<text x="142" y="116" text-anchor="end" font-family="sans-serif" font-size="14" font-weight="500" fill="black">M</text>
<text x="414" y="196" text-anchor="start" font-family="sans-serif" font-size="14" font-weight="500" fill="black">N</text>
<text x="414" y="336" text-anchor="start" font-family="sans-serif" font-size="14" font-weight="500" fill="black">O</text>
<text x="266" y="296" text-anchor="end" font-family="sans-serif" font-size="14" font-weight="500" fill="black">P</text>

<!-- Image M'N'O'P' - orange EA8556 -->
<polygon points="320,80 560,160 560,280 440,240" fill="none" stroke="#EA8556" stroke-width="2"/>
<text x="306" y="76" text-anchor="end" font-family="sans-serif" font-size="14" font-weight="500" fill="#EA8556">M'</text>
