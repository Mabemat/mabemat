function toggleBrevet(btn) {
  var corr = btn.nextElementSibling;
  var hidden = corr.style.display === 'none';
  corr.style.display = hidden ? 'block' : 'none';
  btn.innerHTML = hidden ? '&#9660; Masquer la correction' : '&#9658; Voir la correction';
  btn.classList.toggle('brevet-btn--open', hidden);
}
