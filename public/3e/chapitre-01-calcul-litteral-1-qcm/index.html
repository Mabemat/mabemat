<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"
  onload="
    /* 1. Rendre visibles les panneaux de séances inactifs (display:none)
          sinon KaTeX mesure des métriques à zéro dans les parents cachés.
          IMPORTANT : on force aussi la largeur explicite du panneau, sinon
          position:absolute fait perdre le width:100% relatif au parent et
          KaTeX mesure les \\widehat / \\cancel à la largeur du viewport,
          produisant des barres et chapeaux qui débordent largement. */
    var hiddenPanels = [];
    document.querySelectorAll('.seance-panel, .mode-panel').forEach(function(p) {
      if (getComputedStyle(p).display === 'none') {
        var w = p.parentElement ? p.parentElement.getBoundingClientRect().width : 0;
        hiddenPanels.push(p);
        if (p.parentElement && getComputedStyle(p.parentElement).position === 'static') {
          p.dataset.katexParentRel = '1';
          p.parentElement.style.position = 'relative';
        }
        if (w > 0) p.style.width = w + 'px';
        p.style.visibility = 'hidden';
        p.style.position   = 'absolute';
        p.style.left       = '0';
        p.style.top        = '0';
        p.style.display    = 'block';
      }
    });

    /* 2. Rendre visibles les divs de correction cachées (même fix de largeur) */
    var corrDivs = document.querySelectorAll('.auto3-corr, .exo-corr, .corr-box');
    corrDivs.forEach(function(d) {
      if (d.style.display === 'none' || d.style.display === '') {
        var wc = d.parentElement ? d.parentElement.getBoundingClientRect().width : 0;
        d.dataset.katexHide = '1';
        if (d.parentElement && getComputedStyle(d.parentElement).position === 'static') {
          d.dataset.katexParentRel = '1';
          d.parentElement.style.position = 'relative';
        }
        if (wc > 0) d.style.width = wc + 'px';
        d.style.visibility = 'hidden';
        d.style.position   = 'absolute';
        d.style.left       = '0';
        d.style.top        = '0';
        d.style.display    = 'block';
      }
    });

    /* 3. Rendu KaTeX sur toute la page */
    renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$',  right: '$',  display: false}
      ]
    });

    /* 4. Restaurer les panneaux */
    hiddenPanels.forEach(function(p) {
      p.style.display    = '';
      p.style.visibility = '';
      p.style.position   = '';
      p.style.left       = '';
      p.style.top        = '';
      p.style.width      = '';
      if (p.dataset.katexParentRel === '1' && p.parentElement) {
        p.parentElement.style.position = '';
        delete p.dataset.katexParentRel;
      }
    });

    /* 5. Restaurer les corrections */
    corrDivs.forEach(function(d) {
      if (d.dataset.katexHide) {
        d.style.display    = '';
        d.style.visibility = '';
        d.style.position   = '';
        d.style.left       = '';
        d.style.top        = '';
        d.style.width      = '';
        if (d.dataset.katexParentRel === '1' && d.parentElement) {
          d.parentElement.style.position = '';
          delete d.dataset.katexParentRel;
        }
        delete d.dataset.katexHide;
      }
    });
  "></script>
