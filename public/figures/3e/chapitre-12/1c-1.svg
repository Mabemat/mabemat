<svg viewBox="0 0 700 530" xmlns="http://www.w3.org/2000/svg" font-family="serif" font-size="12">

  <!--
    Mapping :
    px_x = 80 + 5x
    px_y = 470 - 28.125y   (y en unités, 1 unité = 2000 F)

    Rouge  : y = 0.225x
    Bleue  : y = 4.2 + 0.125x

    x=30 :
      rouge : y=6.75  → py=280.2
      bleue : y=7.95  → py=246.4   ← pointillé vertical s'arrête ici (le plus haut)

    x=42 :
      bleue : y=4.2+0.125*42=9.45 → py=470-9.45*28.125=204.3  ← pointillé vertical s'arrête ici
  -->

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="black"/>
    </marker>
  </defs>

  <!-- Grille secondaire (lightgray) -->
  <g stroke="#d3d3d3" stroke-width="0.6">
    <line x1="135" y1="20" x2="135" y2="470"/>
    <line x1="190" y1="20" x2="190" y2="470"/>
    <line x1="245" y1="20" x2="245" y2="470"/>
    <line x1="300" y1="20" x2="300" y2="470"/>
    <line x1="355" y1="20" x2="355" y2="470"/>
    <line x1="410" y1="20" x2="410" y2="470"/>
    <line x1="465" y1="20" x2="465" y2="470"/>
    <line x1="520" y1="20" x2="520" y2="470"/>
    <line x1="575" y1="20" x2="575" y2="470"/>
    <line x1="630" y1="20" x2="630" y2="470"/>
    <line x1="80" y1="441.9" x2="630" y2="441.9"/>
    <line x1="80" y1="413.8" x2="630" y2="413.8"/>
    <line x1="80" y1="385.6" x2="630" y2="385.6"/>
    <line x1="80" y1="357.5" x2="630" y2="357.5"/>
    <line x1="80" y1="329.4" x2="630" y2="329.4"/>
    <line x1="80" y1="301.3" x2="630" y2="301.3"/>
    <line x1="80" y1="273.1" x2="630" y2="273.1"/>
    <line x1="80" y1="245.0" x2="630" y2="245.0"/>
    <line x1="80" y1="216.9" x2="630" y2="216.9"/>
    <line x1="80" y1="188.8" x2="630" y2="188.8"/>
    <line x1="80" y1="160.6" x2="630" y2="160.6"/>
    <line x1="80" y1="132.5" x2="630" y2="132.5"/>
    <line x1="80" y1="104.4" x2="630" y2="104.4"/>
    <line x1="80" y1="76.3" x2="630" y2="76.3"/>
    <line x1="80" y1="48.1" x2="630" y2="48.1"/>
    <line x1="80" y1="20.0" x2="630" y2="20.0"/>
  </g>

  <!-- === Lignes pointillées corrigées === -->

  <!-- x=30 : pointillé noir vertical de l'axe X jusqu'au point bleu (py=246.4) -->
  <line x1="230" y1="470" x2="230" y2="246.4" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- x=30 : pointillé rouge horizontal du point rouge vers l'axe Y (py=280.2) -->
  <line x1="230" y1="280.2" x2="80" y2="280.2" stroke="red" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- x=30 : pointillé bleu horizontal du point bleu vers l'axe Y (py=246.4) -->
  <line x1="230" y1="246.4" x2="80" y2="246.4" stroke="blue" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- x=42 : pointillé noir vertical de l'axe X jusqu'à la droite bleue (py=204.3) -->
  <line x1="290" y1="470" x2="290" y2="204.3" stroke="black" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- === Droites === -->
  <line x1="80" y1="470" x2="435.6" y2="20" stroke="red" stroke-width="2"/>
  <line x1="80" y1="351.9" x2="552" y2="20" stroke="blue" stroke-width="2"/>

  <!-- === Points === -->
  <circle cx="230" cy="280.2" r="4" fill="red"/>
  <circle cx="230" cy="246.4" r="4" fill="blue"/>

  <!-- === Axes === -->
  <line x1="80" y1="470" x2="640" y2="470" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="80" y1="470" x2="80" y2="10" stroke="black" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Graduation X -->
  <g font-size="11" text-anchor="middle" fill="black">
    <line x1="135" y1="467" x2="135" y2="473" stroke="black"/>
    <text x="135" y="484">10</text>
    <line x1="190" y1="467" x2="190" y2="473" stroke="black"/>
    <text x="190" y="484">20</text>
    <line x1="245" y1="467" x2="245" y2="473" stroke="black"/>
    <text x="245" y="484">30</text>
    <line x1="300" y1="467" x2="300" y2="473" stroke="black"/>
    <text x="300" y="484">40</text>
    <line x1="355" y1="467" x2="355" y2="473" stroke="black"/>
    <text x="355" y="484">50</text>
    <line x1="410" y1="467" x2="410" y2="473" stroke="black"/>
    <text x="410" y="484">60</text>
    <line x1="465" y1="467" x2="465" y2="473" stroke="black"/>
    <text x="465" y="484">70</text>
    <line x1="520" y1="467" x2="520" y2="473" stroke="black"/>
    <text x="520" y="484">80</text>
    <line x1="575" y1="467" x2="575" y2="473" stroke="black"/>
    <text x="575" y="484">90</text>
    <line x1="630" y1="467" x2="630" y2="473" stroke="black"/>
    <text x="630" y="484">100</text>
  </g>

  <!-- Label x=42 -->
  <text x="290" y="486" text-anchor="middle" font-size="11" fill="black">42</text>

  <!-- Graduation Y -->
  <g font-size="10" text-anchor="end" fill="black">
    <text x="74" y="474">0</text>
    <line x1="77" y1="441.9" x2="83" y2="441.9" stroke="black"/>
    <text x="74" y="445">2 000</text>
    <line x1="77" y1="413.8" x2="83" y2="413.8" stroke="black"/>
    <text x="74" y="417">4 000</text>
    <line x1="77" y1="385.6" x2="83" y2="385.6" stroke="black"/>
    <text x="74" y="389">6 000</text>
    <line x1="77" y1="357.5" x2="83" y2="357.5" stroke="black"/>
    <text x="74" y="361">8 000</text>
    <line x1="77" y1="329.4" x2="83" y2="329.4" stroke="black"/>
    <text x="74" y="333">10 000</text>
    <line x1="77" y1="301.3" x2="83" y2="301.3" stroke="black"/>
    <text x="74" y="305">12 000</text>
    <line x1="77" y1="273.1" x2="83" y2="273.1" stroke="black"/>
    <text x="74" y="277">14 000</text>
    <line x1="77" y1="245.0" x2="83" y2="245.0" stroke="black"/>
    <text x="74" y="249">16 000</text>
    <line x1="77" y1="216.9" x2="83" y2="216.9" stroke="black"/>
    <text x="74" y="221">18 000</text>
    <line x1="77" y1="188.8" x2="83" y2="188.8" stroke="black"/>
    <text x="74" y="193">20 000</text>
    <line x1="77" y1="160.6" x2="83" y2="160.6" stroke="black"/>
    <text x="74" y="165">22 000</text>
    <line x1="77" y1="132.5" x2="83" y2="132.5" stroke="black"/>
    <text x="74" y="137">24 000</text>
    <line x1="77" y1="104.4" x2="83" y2="104.4" stroke="black"/>
    <text x="74" y="109">26 000</text>
    <line x1="77" y1="76.3" x2="83" y2="76.3" stroke="black"/>
    <text x="74" y="81">28 000</text>
    <line x1="77" y1="48.1" x2="83" y2="48.1" stroke="black"/>
    <text x="74" y="53">30 000</text>
    <line x1="77" y1="20.0" x2="83" y2="20.0" stroke="black"/>
    <text x="74" y="25">32 000</text>
  </g>

  <!-- Valeurs Y lues pour x=30 -->
  <text x="74" y="283" text-anchor="end" font-size="10" fill="red">13 500</text>
  <text x="74" y="249.5" text-anchor="end" font-size="10" fill="blue">15 900</text>

  <!-- Légendes axes -->
  <text x="360" y="510" text-anchor="middle" font-size="13" font-style="italic">Distance (en km)</text>
  <text x="20" y="250" text-anchor="middle" font-size="13" font-style="italic"
        transform="rotate(-90,20,250)">Prix (en F)</text>

  <!-- Étiquettes f et g -->
  <rect x="286" y="172" width="22" height="20" fill="white"/>
  <text x="297" y="187" text-anchor="middle" font-size="14" fill="red" font-style="italic">f</text>

  <rect x="470" y="49" width="22" height="20" fill="white"/>
  <text x="481" y="64" text-anchor="middle" font-size="14" fill="blue" font-style="italic">g</text>

</svg>
