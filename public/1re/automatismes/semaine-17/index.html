<script>
(function () {
  var LETTERS = ['A', 'B', 'C', 'D'];

   
  var projBtn     = document.getElementById('projToggle');

  function markCorrectChoices() {
    document.querySelectorAll('.auto1re-card').forEach(function(card) {
      var correct = parseInt(card.dataset.correct, 10);
      card.querySelectorAll('.auto1re-choice').forEach(function(c, i) {
        c.classList.toggle('proj-correct', i === correct);
      });
    });
  }

  function setProj(on) {
    document.body.classList.toggle('proj', on);
    if (projBtn) projBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
    if (on) {
      document.body.classList.remove('show-corr');
      document.querySelectorAll('.mode-tabs button').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.mode-panel').forEach(function(p) { p.classList.remove('active'); });
      var seanceBtn = document.querySelector('.mode-tabs button[data-tab="seance"]');
      if (seanceBtn) seanceBtn.classList.add('active');
      var seancePanel = document.getElementById('auto-panel-seance');
      if (seancePanel) seancePanel.classList.add('active');
      markCorrectChoices();
    }
    try {
      if (window.renderMathInElement) {
        window.renderMathInElement(document.body, {
          delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]
        });
      }
    } catch(e) {}
  }

  if (projBtn) projBtn.addEventListener('click', function() {
    setProj(!document.body.classList.contains('proj'));
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.body.classList.contains('proj')) {
      setProj(false); return;
    }
    if (!document.body.classList.contains('proj')) return;
    if (e.target.matches('input, textarea')) return;
    if (e.key === 'c' || e.key === 'C') {
      document.body.classList.toggle('show-corr');
    }
  });

   
  document.querySelectorAll('.mode-tabs button').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.mode-tabs button').forEach(function (b) { b.classList.remove('active'); });
      document.querySelectorAll('.mode-panel').forEach(function (p) { p.classList.remove('active'); });
      btn.classList.add('active');
      var panel = document.getElementById('auto-panel-' + btn.dataset.tab);
      if (panel) panel.classList.add('active');
    });
  });

   
  var src = document.getElementById('auto1re-src');
  if (!src) return;

  var seanceBox = src.querySelector('.qcm-container[data-no-score="true"]');
  var devoirBox = src.querySelector('.qcm-container[data-mode="devoir"]');

  buildSeance(seanceBox);
  buildDevoir(devoirBox);

  function buildSeance(box) {
    if (!box) return;
    var target = document.getElementById('seance-cards');
    var fill   = document.getElementById('fill-seance');
    var cur    = document.getElementById('cur-seance');
    var rawCards = box.querySelectorAll('.qcm-q.qcm-auto');
    var total  = rawCards.length;
    var score  = 0, answered = 0;

    rawCards.forEach(function (old, i) {
      var card    = makeCard(old, i, 'Question');
      var correct = parseInt(old.dataset.correct, 10);
      var choices = card.querySelectorAll('.auto1re-choice');
      var corrDiv = card.querySelector('.auto1re-corr');
      target.appendChild(card);

      choices.forEach(function (choice, ci) {
        choice.addEventListener('click', function () {
          if (card.classList.contains('answered')) return;
          card.classList.add('answered');
          choice.classList.add('picked');
          if (ci === correct) {
            choice.classList.add('correct');
            score++;
          } else {
            choice.classList.add('wrong');
            choices[correct].classList.add('correct');
          }
          answered++;
          cur.textContent = score;
          if (fill) fill.style.width = Math.round(answered / total * 100) + '%';
          corrDiv.classList.add('open');
        });
      });
    });
  }

  function buildDevoir(box) {
    if (!box) return;
    var target  = document.getElementById('devoir-cards');
    var fill    = document.getElementById('fill-devoir');
    var cur     = document.getElementById('cur-devoir');
    var totEl   = document.getElementById('tot-devoir');
    var result  = document.getElementById('devoir-result');
    var rawCards = box.querySelectorAll('.qcm-q.qcm-auto');
    var total   = rawCards.length;
    var score   = 0, answered = 0;

    if (totEl) totEl.textContent = '/' + total;

    rawCards.forEach(function (old, i) {
      var card    = makeCard(old, i, 'Devoir');
      var correct = parseInt(old.dataset.correct, 10);
      var choices = card.querySelectorAll('.auto1re-choice');
      target.appendChild(card);

      choices.forEach(function (choice, ci) {
        choice.addEventListener('click', function () {
          if (card.classList.contains('answered')) return;
          card.classList.add('answered');
          choice.classList.add('picked-devoir');
          if (ci === correct) score++;
          answered++;
          if (fill) fill.style.width = Math.round(answered / total * 100) + '%';
          if (answered === total) {
            cur.textContent = score;
            if (result) {
              var msg = score === total
                ? 'Parfait — ' + score + '/' + total + ' !'
                : score >= Math.ceil(total / 2)
                  ? score + '/' + total + ' — bien joué !'
                  : score + '/' + total;
              result.textContent = msg;
              result.style.display = 'block';
            }
          }
        });
      });
    });
  }

  function makeCard(old, index, label) {
    var correct    = parseInt(old.dataset.correct, 10);
    var questionEl = old.querySelector('.qcm-question');
    var opts       = old.querySelectorAll('.qcm-o');
    var corrEl     = old.querySelector('.qcm-correction');

    var article = document.createElement('article');
    article.className = 'auto1re-card';
    article.dataset.correct = correct;

    var numStr = String(index + 1).padStart(2, '0');
    var head = document.createElement('div');
    head.className = 'auto1re-head';
    head.innerHTML = '<div class="auto1re-num">' + numStr + '</div>'
                   + '<div class="auto1re-label">' + label + '</div>';
    article.appendChild(head);

    var enonce = document.createElement('div');
    enonce.className = 'auto1re-enonce';
    enonce.innerHTML = questionEl ? questionEl.innerHTML : '';
    article.appendChild(enonce);

    var choicesDiv = document.createElement('div');
    choicesDiv.className = 'auto1re-choices';
    opts.forEach(function (opt, i) {
      var btn = document.createElement('button');
      btn.className = 'auto1re-choice';
      var spans = opt.querySelectorAll('span');
      var bodyHTML = spans.length >= 2 ? spans[spans.length - 1].innerHTML : opt.innerHTML;
      btn.innerHTML = '<span class="auto1re-bullet">' + LETTERS[i] + '</span>'
                    + '<span class="auto1re-body">' + bodyHTML + '</span>';
      choicesDiv.appendChild(btn);
    });
    article.appendChild(choicesDiv);

    var corr = document.createElement('div');
    corr.className = 'auto1re-corr';
    var corrLabel = document.createElement('span');
    corrLabel.className = 'auto1re-corr-label';
    corrLabel.textContent = 'Correction';
    corr.appendChild(corrLabel);
    if (corrEl) {
      var body = document.createElement('div');
      body.innerHTML = corrEl.innerHTML;
      corr.appendChild(body);
    }
    article.appendChild(corr);

    return article;
  }
})();
</script>
