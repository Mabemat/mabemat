    name = "1re"
    url = "/1re/"
    weight = 5
  [[menu.main]]
    name = "Liens"
    url = "/liens/"
    weight = 6

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$'], ['\[', '\]']]
          inline = [['$', '$'], ['\(', '\)']]

[markup.highlight]
  anchorLineNos = false
  codeFences = true
  guessSyntax = false
  hl_Lines = ""
  hl_inline = false
  lineAnchors = ""
  lineNos = true
  lineNumbersInTable = false
  noClasses = true
  noHl = false
  style = "friendly"
  tabWidth = 4
